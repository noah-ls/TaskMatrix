name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  XCODE_PROJECT: TaskMatrix.xcodeproj
  APP_SCHEME: TaskMatrix
  TEST_SCHEME: TaskMatrixTests
  DERIVED_DATA: DerivedData

jobs:
  release:
    name: Build, Package, and Publish
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build release app
        run: >
          xcodebuild build
          -project "$XCODE_PROJECT"
          -scheme "$APP_SCHEME"
          -configuration Release
          -destination 'platform=macOS'
          -derivedDataPath "$DERIVED_DATA"

      - name: Run tests
        run: >
          xcodebuild test
          -project "$XCODE_PROJECT"
          -scheme "$TEST_SCHEME"
          -destination 'platform=macOS'
          -derivedDataPath "$DERIVED_DATA"

      - name: Package DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/package_dmg.sh \
            "$DERIVED_DATA/Build/Products/Release/TaskMatrix.app" \
            "TaskMatrix-${VERSION}.dmg"

      - name: Verify DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          hdiutil verify "TaskMatrix-${VERSION}.dmg"

      - name: Create release notes
        run: |
          {
            echo "TaskMatrix ${GITHUB_REF_NAME}"
            echo
            echo "See CHANGELOG.md for release notes."
            echo
            echo "This DMG is generated by CI. For broad end-user distribution,"
            echo "maintainers should sign and notarize the app with their own"
            echo "Apple Developer ID."
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "TaskMatrix-${VERSION}.dmg" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md

